input {
  tcp {
    mode => "server"
    host => "0.0.0.0"
    port => 4560
    codec => json_lines
    type => "info"
  }
}
filter {}
output {
  elasticsearch {
      action => "index"
      hosts => ["http://elasticsearch:9200"]
      index => "group-buy-me-log-%{+YYYY.MM.dd}"
    }
  stdout { codec => rubydebug }
}
